services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_SECRET: ${APP_SECRET}
      SESSION_COOKIE_SECURE: "true"
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID: ""
      TELEGRAM_POLLING: "false"
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_SHEETS_REDIRECT_URI: ${GOOGLE_SHEETS_REDIRECT_URI:-}
      GOOGLE_TOKEN_ENC_KEY: ${GOOGLE_TOKEN_ENC_KEY:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_LOG_MODEL: ${LLM_LOG_MODEL:-deepseek/deepseek-v4-flash}
      LLM_MODEL: ${LLM_MODEL:-deepseek/deepseek-v4-flash}
      LLM_QUERY_MODEL: ${LLM_QUERY_MODEL:-deepseek/deepseek-v4-flash}
      LLM_MEDIA_MODEL: ${LLM_MEDIA_MODEL:-google/gemini-2.5-flash-lite}
      LLM_OCR_MODEL: ${LLM_OCR_MODEL:-google/gemini-2.5-flash-lite}
      TZ: ${TZ}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  pgdata:
