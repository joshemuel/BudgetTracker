services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-budget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-budget}
      POSTGRES_DB: ${POSTGRES_DB:-budget}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budget} -d ${POSTGRES_DB:-budget}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-budget}:${POSTGRES_PASSWORD:-budget}@db:5432/${POSTGRES_DB:-budget}
      APP_SECRET: ${APP_SECRET:-dev-secret-change-me}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai
      LLM_LOG_MODEL: gemini-2.5-flash-lite
      LLM_MODEL: gemini-2.5-flash-lite
      LLM_QUERY_MODEL: gemini-2.5-flash
      TZ: ${TZ:-Asia/Jakarta}
      TELEGRAM_POLLING: ${TELEGRAM_POLLING:-false}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./BudgetTrackerPrototype.xlsx:/seed/BudgetTrackerPrototype.xlsx:ro

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
