limit_req_zone $binary_remote_addr zone=bt_login:10m rate=5r/m;

server {
    listen 80;
    server_name budgettracker.ddns.net;

    server_tokens off;
    client_max_body_size 20M;

    # Security headers (HSTS added by certbot after TLS is set up)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    location = /api/auth/login {
        limit_req zone=bt_login burst=3 nodelay;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        root /var/www/budgettracker;
        try_files $uri $uri/ /index.html;
    }
}
